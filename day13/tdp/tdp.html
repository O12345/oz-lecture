<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TO-DO List</title>
    <style>
        /* CSS: 디자인 담당 */
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; line-height: 1.6; }
        h2 { color: #333; }
        
        /* 입력창 영역 */
        .input-group { margin-bottom: 20px; }
        input { padding: 8px; width: 250px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; }
        
        /* 버튼 색상들 */
        .add-btn { background-color: #cacaca; color: white; }
        .clear-btn { background-color: #cacaca; color: white; margin-left: 10px; }
        .delete-btn { background-color: #cacaca; margin-left: 8px; padding: 4px 8px; font-size: 12px; }

        /* 리스트 스타일 */
        ul { padding: 0; }
        li { 
            background: #f9f9f9; margin-bottom: 10px; padding: 10px; 
            border-radius: 4px; display: flex; align-items: center; 
            /* border-left: 5px solid #28a745; */
        }

        /* 체크박스 선택 시 글자 스타일 */
        .completed span {
            text-decoration: line-through;
            color: #aaa;
        }
        span { flex-grow: 1; margin-left: 10px; }
    </style>
</head>
<body>

    <h2>TO-DO List</h2>
    
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
        <button class="add-btn" onclick="addTodo()">추가</button>
        <button class="clear-btn" onclick="clearAll()">전체 삭제</button>
    </div>

    <ul id="todo-list"></ul>

    <script src="script.js"></script>
</body>
</html>
